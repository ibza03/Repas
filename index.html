<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Famille</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .ios-card { transition: all 0.2s; background: white; border-radius: 2rem; padding: 1.5rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .ios-card:active { transform: scale(0.97); background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 pt-10">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-black mb-8 text-slate-800">Menu Famille 🍴</h1>
        <div id="app" class="space-y-4">
            <div class="text-center py-20 text-slate-400 italic animate-pulse">
                Connexion à Firebase en cours...
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION PRECISE (SANS ESPACES)
        var firebaseConfig = {
            databaseURL: "https://meal-planner-famille-default-rtdb.europe-west1.firebasedatabase.app"
        };

        // INITIALISATION
        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.database();
            var jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];

            // ECOUTE DES DONNEES
            db.ref('menus/').on('value', function(snapshot) {
                var data = snapshot.val() || {};
                var container = document.getElementById('app');
                container.innerHTML = '';

                jours.forEach(function(j) {
                    var menu = data[j] || { midi: "Ajouter", soir: "Ajouter" };
                    var card = document.createElement('div');
                    card.className = "ios-card mb-4";
                    card.innerHTML = 
                        '<b class="text-orange-500 text-xs uppercase tracking-widest block mb-4 border-b pb-2">' + j + '</b>' +
                        '<div onclick="upd(\''+j+'\',\'midi\',\''+menu.midi+'\')" class="mb-4 cursor-pointer">' +
                            '<small class="text-slate-400 font-bold text-[10px] block">SOLAIRE MIDI</small>' +
                            '<p class="text-slate-700 font-bold text-lg leading-tight">' + menu.midi + '</p>' +
                        '</div>' +
                        '<div onclick="upd(\''+j+'\',\'soir\',\''+menu.soir+'\')" class="cursor-pointer">' +
                            '<small class="text-indigo-400 font-bold text-[10px] block">LUNAIRE SOIR</small>' +
                            '<p class="text-slate-700 font-bold text-lg leading-tight">' + menu.soir + '</p>' +
                        '</div>';
                    container.appendChild(card);
                });
            }, function(error) {
                document.getElementById('app').innerHTML = 
                    '<div class="bg-red-500 text-white p-6 rounded-3xl font-bold">' +
                    'ERREUR DE PERMISSION : ' + error.code + 
                    '<br><br>Vérifie tes règles Firebase (read/write: true) !' +
                    '</div>';
            });

            // FONCTION DE MISE À JOUR
            window.upd = function(j, moment, actuel) {
                var val = prompt("Repas du " + j + " (" + moment + ") :", (actuel === "Ajouter" ? "" : actuel));
                if (val !== null) {
                    db.ref('menus/' + j + '/' + moment).set(val.trim() || "Ajouter");
                }
            };
        } catch (e) {
            document.getElementById('app').innerHTML = '<div class="bg-orange-500 text-white p-6 rounded-3xl">ERREUR : ' + e.message + '</div>';
        }
    </script>
</body>
</html>
