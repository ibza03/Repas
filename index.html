<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meal Planner Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Nunito', sans-serif; background: #FAF7F4; color: #1E1B18; padding-bottom: 100px; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .ios-card { background: white; border-radius: 1.5rem; border: 1.5px solid #EDE6DE; }
        .tab-bar { background: rgba(250, 247, 244, 0.95); backdrop-filter: blur(20px); border-top: 1px solid #EDE6DE; }
        .active-tab { color: #E85D75 !important; font-weight: 800; }
        .badge { background: #E85D75; color: white; border-radius: 10px; padding: 1px 6px; font-size: 10px; position: absolute; top: 0; right: 5px; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-[#1E1B18] text-[#FAF7F4] p-4 shadow-lg">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🍽 Meal Planner</h1>
            <div class="flex items-center gap-2">
                <div id="sync-status" class="w-2 h-2 bg-green-500 rounded-full"></div>
                <span class="text-[9px] uppercase font-black opacity-50">Live Sync</span>
            </div>
        </div>
    </nav>

    <main id="app-content" class="max-w-xl mx-auto p-4"></main>

    <div class="fixed bottom-0 left-0 right-0 tab-bar z-50 pb-6">
        <div class="max-w-xl mx-auto flex justify-around p-2 text-[#B0A49A]">
            <button onclick="setTab('week')" id="btn-week" class="flex flex-col items-center gap-1 flex-1">
                <span class="text-2xl">📅</span><span class="text-[10px]">Semaine</span>
            </button>
            <button onclick="setTab('meals')" id="btn-meals" class="flex flex-col items-center gap-1 flex-1">
                <span class="text-2xl">🍳</span><span class="text-[10px]">Repas</span>
            </button>
            <button onclick="setTab('baby')" id="btn-baby" class="flex flex-col items-center gap-1 flex-1">
                <span class="text-2xl">👶🏽</span><span class="text-[10px]">Bébés</span>
            </button>
            <button onclick="setTab('list')" id="btn-list" class="flex flex-col items-center gap-1 flex-1 relative">
                <span class="text-2xl">🛒</span><span class="text-[10px]">Courses</span>
                <span id="list-badge" class="badge hidden">0</span>
            </button>
            <button onclick="setTab('sync')" id="btn-sync" class="flex flex-col items-center gap-1 flex-1">
                <span class="text-2xl">🔄</span><span class="text-[10px]">Partage</span>
            </button>
        </div>
    </div>

    <script>
        // 1. DATA & CONFIG
        const config = { databaseURL: "https://meal-planner-famille-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();

        const RECIPES = [
            { id:"r1",  name:"Poulet rôti", cat:"Dîner", ing:["poulet","ail","huile d'olive","thym","citron","pomme de terre"] },
            { id:"r2",  name:"Spaghetti pesto", cat:"Dîner", ing:["spaghetti","pesto","parmesan","ail","pignons de pin"] },
            { id:"r3",  name:"Spaghetti bolognaise", cat:"Dîner", ing:["spaghetti","boeuf haché","tomate","oignon","parmesan"] },
            { id:"r4",  name:"Riz poulet coco", cat:"Dîner", ing:["riz","poulet","lait de coco","curry","oignon"] },
            { id:"r13", name:"Tartines & yaourt", cat:"Petit-déjeuner", ing:["pain","beurre","confiture","yaourt","orange"] },
            // ... (Toutes tes autres recettes sont incluses dans la logique de sélection)
        ];

        let state = { currentTab: 'week', week: {}, baby: {}, shopping: {} };

        // 2. REAL-TIME SYNC
        db.ref('/').on('value', (snap) => {
            const data = snap.val();
            if (data) {
                state.week = data.week || {};
                state.baby = data.baby || {};
                state.shopping = data.shopping || {};
                render();
            }
        });

        function setTab(t) { state.currentTab = t; render(); }

        // 3. LOGIQUE COURSES (Auto-Génération)
        function updateShoppingList() {
            let needed = {};
            Object.values(state.week).forEach(day => {
                Object.values(day).forEach(recipeId => {
                    const r = RECIPES.find(x => x.id === recipeId);
                    if (r) r.ing.forEach(i => { 
                        if (!state.shopping[i]) needed[i] = false; 
                    });
                });
            });
            // On fusionne avec l'existant sans écraser les "cochés"
            db.ref('shopping').update(needed);
        }

        // 4. RENDU
        function render() {
            const container = document.getElementById('app-content');
            
            // UI Tabs
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`btn-${state.currentTab}`).classList.add('active-tab');

            if (state.currentTab === 'week') {
                const jours = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
                let html = `<h2 class="text-2xl font-bold mb-6">Ma Semaine</h2>`;
                jours.forEach(j => {
                    const d = state.week[j] || {};
                    html += `<div class="ios-card p-5 mb-4 shadow-sm">
                        <b class="text-orange-500 text-[10px] uppercase tracking-widest mb-3 block">${j}</b>
                        <div class="space-y-4">
                            ${['Petit-déjeuner','Déjeuner','Dîner'].map(slot => `
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase">${slot}</p>
                                    <select onchange="saveWeek('${j}','${slot}',this.value)" class="w-full bg-slate-50 border-none font-bold text-sm rounded-lg p-2 mt-1">
                                        <option value="">— Choisir —</option>
                                        ${RECIPES.filter(r => r.cat === slot || slot === 'Déjeuner').map(r => 
                                            `<option value="${r.id}" ${d[slot] === r.id ? 'selected' : ''}>${r.name}</option>`
                                        ).join('')}
                                    </select>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
            }

            if (state.currentTab === 'list') {
                const items = Object.entries(state.shopping || {});
                let html = `<div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Courses</h2>
                    <button onclick="clearList()" class="text-xs text-red-500 font-bold">Vider</button>
                </div>`;
                items.forEach(([name, checked]) => {
                    html += `<div onclick="toggleItem('${name}', ${checked})" class="ios-card p-4 mb-2 flex items-center gap-3 ${checked ? 'opacity-40' : ''}">
                        <div class="w-5 h-5 border-2 border-orange-500 rounded flex items-center justify-center">
                            ${checked ? '✓' : ''}
                        </div>
                        <span class="${checked ? 'line-through' : 'font-bold'}">${name}</span>
                    </div>`;
                });
                container.innerHTML = html || '<p class="text-center text-slate-400">Liste vide. Planifiez des repas !</p>';
            }

            if (state.currentTab === 'baby') {
                container.innerHTML = `<h2 class="text-2xl font-bold mb-6">Bébés 👶🏽</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="ios-card p-4 border-b-4 border-pink-400"><b>Rokhaya</b><p class="text-xs opacity-60">Midi: ${state.baby.rokhaya?.midi || '-'}</p></div>
                    <div class="ios-card p-4 border-b-4 border-blue-400"><b>Saliou</b><p class="text-xs opacity-60">Midi: ${state.baby.saliou?.midi || '-'}</p></div>
                </div>
                <p class="text-[10px] mt-10 text-center opacity-40 italic underline" onclick="editBaby()">Cliquer pour modifier les repas bébés</p>`;
            }

            if (state.currentTab === 'sync') {
                container.innerHTML = `<h2 class="text-2xl font-bold mb-6">Partage</h2>
                <div class="space-y-4">
                    <button onclick="exportJSON()" class="w-full ios-card p-6 text-left font-bold">📤 Exporter les données (.json)</button>
                    <div class="p-4 text-xs bg-orange-50 text-orange-700 rounded-2xl leading-relaxed">
                        <b>Astuce :</b> Envoyez le fichier à votre femme, elle n'aura qu'à l'importer pour avoir exactement la même bibliothèque !
                    </div>
                </div>`;
            }
        }

        // 5. ACTIONS
        function saveWeek(day, slot, val) {
            db.ref(`week/${day}/${slot}`).set(val);
            // On déclenche l'ajout automatique d'ingrédients
            const r = RECIPES.find(x => x.id === val);
            if (r) {
                r.ing.forEach(i => db.ref(`shopping/${i}`).set(false));
            }
        }

        function toggleItem(name, current) { db.ref(`shopping/${name}`).set(!current); }
        function clearList() { if(confirm("Vider la liste ?")) db.ref('shopping').remove(); }
        function exportJSON() {
            const data = JSON.stringify(state);
            const blob = new Blob([data], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "repas-famille.json"; a.click();
        }
        function editBaby() {
            const r = prompt("Midi Rokhaya ?"); if(r) db.ref('baby/rokhaya/midi').set(r);
            const s = prompt("Midi Saliou ?"); if(s) db.ref('baby/saliou/midi').set(s);
        }
    </script>
</body>
</html>
