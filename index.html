<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meal Planner Famille</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Nunito', sans-serif; background: #FAF7F4; color: #1E1B18; padding-bottom: 100px; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .tab-bar { background: rgba(250, 247, 244, 0.95); backdrop-filter: blur(20px); border-top: 1px solid #EDE6DE; }
        .ios-card { background: white; border-radius: 1.5rem; border: 1.5px solid #EDE6DE; transition: all 0.2s; }
        .ios-card:active { transform: scale(0.98); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .active-tab { color: #1E1B18 !important; font-weight: 800; }
        .active-tab-icon { opacity: 1 !important; filter: none !important; }
        .active-dot { width: 16px; height: 3px; background: #E85D75; border-radius: 2px; margin-top: 2px; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-[#1E1B18] text-[#FAF7F4] p-4 shadow-lg">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🍽 Meal Planner</h1>
            <span class="text-[10px] font-bold opacity-60 uppercase tracking-widest">En ligne</span>
        </div>
    </nav>

    <main id="app-content" class="max-w-xl mx-auto p-4 animate-in fade-in duration-500">
        <div class="flex flex-col items-center justify-center py-20 text-slate-400">
            <div class="text-4xl animate-bounce mb-4">🍽</div>
            <p class="font-bold">Préparation de la cuisine...</p>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 tab-bar z-50 safe-area-bottom">
        <div class="max-w-xl mx-auto flex justify-around p-2">
            <button onclick="switchTab('week')" class="flex flex-col items-center gap-1 p-2 flex-1">
                <span id="icon-week" class="text-2xl opacity-50 grayscale transition-all">📅</span>
                <span id="text-week" class="text-[10px] text-[#B0A49A]">Semaine</span>
                <div id="dot-week" class="hidden active-dot"></div>
            </button>
            <button onclick="switchTab('baby')" class="flex flex-col items-center gap-1 p-2 flex-1">
                <span id="icon-baby" class="text-2xl opacity-50 grayscale transition-all">👶🏽</span>
                <span id="text-baby" class="text-[10px] text-[#B0A49A]">Bébés</span>
                <div id="dot-baby" class="hidden active-dot"></div>
            </button>
            <button onclick="switchTab('list')" class="flex flex-col items-center gap-1 p-2 flex-1 relative">
                <span id="icon-list" class="text-2xl opacity-50 grayscale transition-all">🛒</span>
                <span id="text-list" class="text-[10px] text-[#B0A49A]">Courses</span>
                <div id="dot-list" class="hidden active-dot"></div>
            </button>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION FIREBASE
        const config = { databaseURL: "https://meal-planner-famille-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let currentTab = 'week';
        let store = { week: {}, baby: {} };

        // 2. RECUPERATION DES DONNEES
        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) store = data;
            render();
        });

        // 3. NAVIGATION
        function switchTab(tab) {
            currentTab = tab;
            render();
        }

        // 4. RENDU DE L'INTERFACE
        function render() {
            const content = document.getElementById('app-content');
            
            // Update Tab UI
            ['week', 'baby', 'list'].forEach(t => {
                document.getElementById(`icon-${t}`).className = `text-2xl transition-all ${currentTab === t ? 'active-tab-icon' : 'opacity-50 grayscale'}`;
                document.getElementById(`text-${t}`).className = `text-[10px] ${currentTab === t ? 'active-tab' : 'text-[#B0A49A]'}`;
                document.getElementById(`dot-${t}`).className = currentTab === t ? 'active-dot' : 'hidden';
            });

            if (currentTab === 'week') {
                renderWeek(content);
            } else if (currentTab === 'baby') {
                renderBaby(content);
            } else if (currentTab === 'list') {
                renderList(content);
            }
        }

        function renderWeek(container) {
            const jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];
            let html = `<h2 class="text-2xl font-bold mb-6">Menu de la Semaine</h2>`;
            
            jours.forEach(j => {
                const m = store.week?.[j] || { midi: "Ajouter", soir: "Ajouter" };
                html += `
                    <div class="ios-card p-6 mb-4 shadow-sm">
                        <span class="text-[10px] font-black text-orange-500 uppercase tracking-widest block mb-4">${j}</span>
                        <div class="flex flex-col gap-4">
                            <div onclick="edit('week/${j}/midi')" class="flex items-center gap-4 cursor-pointer">
                                <div class="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center text-xl">🌿</div>
                                <div><p class="text-[9px] font-bold text-slate-400 uppercase">Déjeuner</p><p class="font-bold">${m.midi || 'Ajouter'}</p></div>
                            </div>
                            <div onclick="edit('week/${j}/soir')" class="flex items-center gap-4 cursor-pointer">
                                <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-xl">🌙</div>
                                <div><p class="text-[9px] font-bold text-slate-400 uppercase">Dîner</p><p class="font-bold">${m.soir || 'Ajouter'}</p></div>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderBaby(container) {
            const bebes = [{id:'rokhaya', name:'Rokhaya', color:'#F06292'}, {id:'saliou', name:'Saliou', color:'#4BA3F5'}];
            let html = `<h2 class="text-2xl font-bold mb-6">Planning Bébés 👶🏽</h2>`;
            
            bebes.forEach(b => {
                html += `<div class="mb-8">
                    <h3 class="text-xl font-bold mb-4" style="color: ${b.color}">${b.name}</h3>
                    <div class="grid grid-cols-2 gap-3">`;
                ["Midi", "Goûter"].forEach(moment => {
                    const val = store.baby?.[b.id]?.[moment] || "Cliquer pour remplir";
                    html += `
                        <div onclick="edit('baby/${b.id}/${moment}')" class="ios-card p-4 text-center cursor-pointer border-2" style="border-color: ${b.color}20">
                            <p class="text-[9px] font-bold opacity-50 uppercase mb-1">${moment}</p>
                            <p class="text-sm font-bold">${val}</p>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        function renderList(container) {
            let html = `<h2 class="text-2xl font-bold mb-6">Liste de Courses 🛒</h2>`;
            // Logique simplifiée pour l'exemple
            html += `<p class="text-center py-10 text-slate-400 italic">La liste se synchronise avec vos menus...</p>`;
            container.innerHTML = html;
        }

        function edit(path) {
            const current = path.split('/').reduce((obj, key) => (obj && obj[key] !== 'undefined') ? obj[key] : "", store);
            const val = prompt("Modifier :", current);
            if (val !== null) {
                db.ref(path).set(val);
            }
        }
    </script>
</body>
</html>
