<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Famille</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-slate-100 p-4">
    <div id="app" class="max-w-md mx-auto space-y-4">
        <h1 class="text-2xl font-bold p-4">Chargement...</h1>
    </div>

    <script>
        var config = { databaseURL: "https://meal-planner-famille-default-rtdb.europe-west1.firebasedatabase.app" };
        
        try {
            firebase.initializeApp(config);
            var db = firebase.database();
            
            db.ref('menus/').on('value', function(snap) {
                var data = snap.val() || {};
                var jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];
                var html = '<h1 class="text-3xl font-black p-4">Menus 🍴</h1>';
                
                jours.forEach(function(j) {
                    var m = data[j] || { midi: "Ajouter", soir: "Ajouter" };
                    html += '<div class="bg-white p-6 rounded-[2rem] shadow-sm mb-4 border border-slate-200">' +
                            '<b class="text-orange-500 block mb-4">' + j + '</b>' +
                            '<div onclick="window.upd(\''+j+'\',\'midi\')" class="mb-4">☀️ <span class="font-bold">' + m.midi + '</span></div>' +
                            '<div onclick="window.upd(\''+j+'\',\'soir\')">🌙 <span class="font-bold">' + m.soir + '</span></div>' +
                            '</div>';
                });
                document.getElementById('app').innerHTML = html;
            }, function(error) {
                document.getElementById('app').innerHTML = "<div class='p-6 bg-red-500 text-white rounded-2xl'><b>ERREUR FIREBASE :</b><br>" + error.code + "</div>";
            });

            window.upd = function(j, m) {
                var val = prompt("Repas du " + j + " (" + m + ") :");
                if (val) db.ref('menus/' + j + '/' + m).set(val);
            };
            
        } catch (e) {
            document.getElementById('app').innerHTML = "<div class='p-6 bg-orange-500 text-white rounded-2xl'><b>ERREUR SCRIPT :</b><br>" + e.message + "</div>";
        }
    </script>
</body>
</html>
