<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Menu Famille</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1046/1046747.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .ios-card { transition: all 0.2s; }
        .ios-card:active { transform: scale(0.98); background-color: #f1f5f9; }
    </style>
</head>
<body class="pb-10 pt-12 px-4">

    <div class="max-w-md mx-auto">
        <header class="mb-8 flex justify-between items-end px-2">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Menu Famille</h1>
                <p class="text-slate-500 font-medium">Qu'est-ce qu'on mange ? 🍴</p>
            </div>
            <div id="sync-indicator" class="mb-2 w-3 h-3 bg-green-500 rounded-full shadow-lg border-2 border-white transition-all duration-300"></div>
        </header>

        <div id="app" class="space-y-4">
            <div class="flex flex-col items-center py-12 text-slate-400 italic">
                Chargement des menus...
            </div>
        </div>
    </div>

    <script>
        // Ta config
        const firebaseConfig = { 
            databaseURL: "https://meal-planner-famille-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        // Initialisation
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];

        function renderApp(data) {
            const container = document.getElementById('app');
            container.innerHTML = '';

            jours.forEach(jour => {
                const menu = (data && data[jour]) ? data[jour] : { midi: "Cliquer pour ajouter", soir: "Cliquer pour ajouter" };
                const card = document.createElement('div');
                card.className = "ios-card bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col gap-4";
                
                card.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                        <span class="font-bold text-slate-400 text-[11px] uppercase tracking-[0.15em]">${jour}</span>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        <div onclick="editMenu('${jour}', 'midi', '${menu.midi.replace(/'/g, "\\'")}')" class="flex items-start gap-3">
                            <div class="bg-orange-100 p-2 rounded-xl">☀️</div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase leading-none mb-1">Midi</p>
                                <p class="text-slate-800 font-semibold leading-tight">${menu.midi}</p>
                            </div>
                        </div>
                        <div onclick="editMenu('${jour}', 'soir', '${menu.soir.replace(/'/g, "\\'")}')" class="flex items-start gap-3">
                            <div class="bg-indigo-100 p-2 rounded-xl">🌙</div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase leading-none mb-1">Soir</p>
                                <p class="text-slate-800 font-semibold leading-tight">${menu.soir}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Fonction d'édition
        window.editMenu = function(jour, moment, actuelle) {
            const val = actuelle === "Cliquer pour ajouter" ? "" : actuelle;
            const rep = prompt("Menu du " + jour + " (" + moment + ") :", val);
            if (rep !== null) {
                const finalValue = rep.trim() === "" ? "Cliquer pour ajouter" : rep.trim();
                db.ref('menus/' + jour + '/' + moment).set(finalValue);
            }
        };

        // Écoute en temps réel
        db.ref('menus/').on('value', (snapshot) => {
            const indicator = document.getElementById('sync-indicator');
            indicator.style.transform = "scale(1.5)";
            setTimeout(() => indicator.style.transform = "scale(1)", 300);
            renderApp(snapshot.val());
        }, (error) => {
            document.getElementById('app').innerHTML = `<p class='text-red-500 p-4'>Erreur Firebase : ${error.message}. Vérifie que ta base est en mode "Test" (Public).</p>`;
        });
    </script>
</body>
</html>
