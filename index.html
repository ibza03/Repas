<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meal Planner Famille</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Nunito', sans-serif; background: #FAF7F4; color: #1E1B18; padding-bottom: 120px; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .ios-card { background: white; border-radius: 1.2rem; border: 1.5px solid #EDE6DE; }
        .tab-bar { background: rgba(250, 247, 244, 0.95); backdrop-filter: blur(20px); border-top: 1px solid #EDE6DE; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
        .active-tab { color: #E85D75 !important; font-weight: 800; }
        .active-dot { width: 14px; height: 3px; background: #E85D75; border-radius: 2px; margin: 2px auto 0; }
        .badge-count { background: #E85D75; color: white; font-size: 10px; border-radius: 10px; padding: 0 5px; position: absolute; top: -5px; right: -5px; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-[#1E1B18] text-[#FAF7F4] p-4 shadow-md">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">🍽 Meal Planner</h1>
            <button onclick="window.location.reload()" class="text-[10px] bg-white/10 px-2 py-1 rounded">🔄 SYNC</button>
        </div>
    </nav>

    <main id="app-content" class="max-w-xl mx-auto p-4"></main>

    <div class="tab-bar">
        <div class="max-w-xl mx-auto flex justify-around p-2 text-[#B0A49A]">
            <button onclick="setTab('week')" id="btn-week" class="flex-1 flex flex-col items-center">
                <span class="text-xl">📅</span><span class="text-[10px]">Semaine</span>
                <div id="dot-week" class="hidden active-dot"></div>
            </button>
            <button onclick="setTab('meals')" id="btn-meals" class="flex-1 flex flex-col items-center">
                <span class="text-xl">🍳</span><span class="text-[10px]">Repas</span>
                <div id="dot-meals" class="hidden active-dot"></div>
            </button>
            <button onclick="setTab('baby')" id="btn-baby" class="flex-1 flex flex-col items-center">
                <span class="text-xl">👶🏽</span><span class="text-[10px]">Bébés</span>
                <div id="dot-baby" class="hidden active-dot"></div>
            </button>
            <button onclick="setTab('list')" id="btn-list" class="flex-1 flex flex-col items-center relative">
                <span class="text-xl">🛒</span><span class="text-[10px]">Courses</span>
                <div id="dot-list" class="hidden active-dot"></div>
                <span id="global-badge" class="badge-count hidden">0</span>
            </button>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION
        const firebaseConfig = { databaseURL: "https://meal-planner-famille-default-rtdb.europe-west1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const FOOD_GROUPS = [
            { id:"viandes", label:"Boucherie", icon:"🥩", color:"#E85D75", kw:["poulet","boeuf","porc","saumon","thon","jambon","steak","lardons","dinde","merlu"] },
            { id:"legumes", label:"Primeur", icon:"🥦", color:"#2ECC8F", kw:["tomate","carotte","courgette","poivron","oignon","ail","pomme de terre","épinard","brocoli","salade","concombre"] },
            { id:"laitiers", label:"Crèmerie", icon:"🧀", color:"#F5B731", kw:["lait","fromage","yaourt","beurre","crème","gruyère","parmesan","mozzarella","emmental"] },
            { id:"feculents", label:"Épicerie", icon:"🍞", color:"#9B72F5", kw:["pain","pâtes","riz","farine","semoule","lentille","quinoa","spaghetti"] }
        ];

        const DEFAULT_RECIPES = {
            "r1": { name:"Poulet rôti", cat:"Dîner", ing:"poulet, ail, huile d'olive, thym, citron, pomme de terre" },
            "r2": { name:"Spaghetti pesto", cat:"Dîner", ing:"spaghetti, pesto, parmesan, ail" },
            "r3": { name:"Spaghetti bolognaise", cat:"Dîner", ing:"spaghetti, boeuf haché, tomate, oignon, parmesan" },
            "r4": { name:"Riz poulet coco", cat:"Dîner", ing:"riz, poulet, lait de coco, curry" },
            "r5": { name:"Quiche au thon", cat:"Dîner", ing:"pâte brisée, thon, oeuf, crème fraîche, gruyère" },
            "r8": { name:"Salade niçoise", cat:"Déjeuner", ing:"salade, thon, tomate, oeuf, olive" },
            "r13": { name:"Tartines & yaourt", cat:"Petit-déjeuner", ing:"pain, beurre, confiture, yaourt" }
        };

        let state = { currentTab: 'week', currentBaby: 'rokhaya', week: {}, meals: {}, baby: {}, checked: {} };

        // 2. SYNCHRONISATION
        db.ref('/').on('value', snap => {
            const data = snap.val() || {};
            
            // Si la base est totalement vide, on injecte les recettes par défaut
            if (!data.meals) {
                db.ref('meals').set(DEFAULT_RECIPES);
                return;
            }

            state.week = data.week || {};
            state.meals = data.meals || {};
            state.baby = data.baby || {};
            state.checked = data.checked || {};
            render();
        });

        function setTab(t) { state.currentTab = t; render(); }

        // 3. LOGIQUE COURSES
        function getShoppingList() {
            let counts = {};
            Object.values(state.week).forEach(day => {
                Object.values(day).forEach(mealId => {
                    const meal = state.meals[mealId];
                    if (meal && meal.ing) {
                        meal.ing.split(',').forEach(i => {
                            let name = i.trim().toLowerCase();
                            if(name) counts[name] = (counts[name] || 0) + 1;
                        });
                    }
                });
            });
            return counts;
        }

        function getGroup(ing) {
            return FOOD_GROUPS.find(g => g.kw.some(k => ing.includes(k))) || { label:"Autres", icon:"🛒", color:"#94A3B8" };
        }

        // 4. RENDU DE L'INTERFACE
        function render() {
            const container = document.getElementById('app-content');
            
            // UI Onglets
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active-tab'));
            document.querySelectorAll('.active-dot').forEach(d => d.classList.add('hidden'));
            document.getElementById(`btn-${state.currentTab}`).classList.add('active-tab');
            document.getElementById(`dot-${state.currentTab}`).classList.remove('hidden');

            if (state.currentTab === 'week') {
                const jours = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
                container.innerHTML = `<h2 class="text-2xl font-bold mb-6">Menu Semaine</h2>` + 
                jours.map(j => `
                    <div class="ios-card p-5 mb-4 shadow-sm border-l-4 border-orange-400">
                        <b class="text-orange-500 text-[10px] uppercase tracking-widest">${j}</b>
                        <div class="mt-3 space-y-3">
                            ${['Petit-déjeuner', 'Déjeuner', 'Dîner'].map(slot => `
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase">${slot}</p>
                                    <select onchange="db.ref('week/${j}/${slot}').set(this.value)" class="w-full font-bold text-sm py-1 outline-none bg-transparent border-b border-slate-100">
                                        <option value="">— Choisir un plat —</option>
                                        ${Object.entries(state.meals).map(([id, m]) => `<option value="${id}" ${state.week[j]?.[slot] === id ? 'selected' : ''}>${m.name}</option>`).join('')}
                                    </select>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            }

            if (state.currentTab === 'meals') {
                container.innerHTML = `<div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Mes Repas</h2>
                    <button onclick="addMeal()" class="bg-[#1E1B18] text-white px-4 py-2 rounded-xl text-xs font-bold">+ Ajouter</button>
                </div>` + Object.entries(state.meals).map(([id, m]) => `
                    <div class="ios-card p-4 mb-3 flex justify-between items-center">
                        <div onclick="addMeal('${id}')" class="cursor-pointer flex-1">
                            <p class="font-bold text-slate-800">${m.name}</p>
                            <p class="text-[10px] text-slate-400 uppercase font-bold">${m.cat}</p>
                        </div>
                        <button onclick="if(confirm('Supprimer ?')) db.ref('meals/${id}').remove()" class="text-red-300 ml-4">🗑</button>
                    </div>
                `).join('');
            }

            if (state.currentTab === 'baby') {
                const b = state.currentBaby === 'rokhaya' ? {name:'Rokhaya', color:'#F06292'} : {name:'Saliou', color:'#4BA3F5'};
                container.innerHTML = `
                    <div class="flex gap-2 mb-8">
                        <button onclick="state.currentBaby='rokhaya';render()" class="flex-1 p-3 rounded-2xl font-bold ${state.currentBaby==='rokhaya'?'bg-[#F06292] text-white shadow-lg':'bg-white text-slate-400'}">Rokhaya</button>
                        <button onclick="state.currentBaby='saliou';render()" class="flex-1 p-3 rounded-2xl font-bold ${state.currentBaby==='saliou'?'bg-[#4BA3F5] text-white shadow-lg':'bg-white text-slate-400'}">Saliou</button>
                    </div>
                    <h3 class="font-bold mb-4 px-2" style="color:${b.color}">Planning de ${b.name}</h3>
                    ${["Matin","Midi","Goûter","Soir"].map(m => `
                        <div onclick="editBaby('${m}')" class="ios-card p-5 mb-3 flex justify-between items-center cursor-pointer border-l-4" style="border-left-color:${b.color}">
                            <div><p class="text-[9px] font-bold opacity-40 uppercase">${m}</p><p class="font-bold text-sm">${state.baby[state.currentBaby]?.[m] || 'Non renseigné'}</p></div>
                            <span class="text-slate-200">✎</span>
                        </div>
                    `).join('')}`;
            }

            if (state.currentTab === 'list') {
                const list = getShoppingList();
                const itemsByGroup = {};
                Object.entries(list).forEach(([name, count]) => {
                    const g = getGroup(name).label;
                    if(!itemsByGroup[g]) itemsByGroup[g] = [];
                    itemsByGroup[g].push({name, count});
                });

                let totalUnchecked = 0;
                let html = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Liste de Courses</h2><button onclick="db.ref('checked').remove()" class="text-xs text-orange-500 font-bold uppercase">Nettoyer</button></div>`;
                
                FOOD_GROUPS.concat({label:"Autres", icon:"🛒", color:"#94A3B8"}).forEach(g => {
                    const items = itemsByGroup[g.label];
                    if(!items) return;
                    html += `<div class="mb-6"><div class="flex items-center gap-2 mb-3"><span class="p-1 px-2 rounded-lg text-sm" style="background:${g.color}20">${g.icon} ${g.label}</span></div><div class="space-y-2">`;
                    items.forEach(it => {
                        if (!state.checked[it.name]) totalUnchecked++;
                        html += `
                            <div onclick="toggleItem('${it.name}')" class="ios-card p-4 flex justify-between items-center ${state.checked[it.name] ? 'opacity-30' : ''}">
                                <span class="text-sm font-bold ${state.checked[it.name] ? 'line-through' : ''}">${it.name} ${it.count > 1 ? `<span class="text-orange-500 ml-1">x${it.count}</span>` : ''}</span>
                                <div class="w-5 h-5 border-2 rounded-md ${state.checked[it.name]?'bg-green-500 border-green-500':'border-slate-200'}"></div>
                            </div>`;
                    });
                    html += `</div></div>`;
                });
                
                container.innerHTML = html || '<div class="text-center py-20 opacity-30 italic">La liste est vide.<br>Ajoutez des repas dans la semaine !</div>';
                const badge = document.getElementById('global-badge');
                if(totalUnchecked > 0) { badge.innerText = totalUnchecked; badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); }
            }
        }

        // 5. ACTIONS
        function addMeal(id) {
            const m = id ? state.meals[id] : {name:'', ing:'', cat:'Dîner'};
            const name = prompt("Nom du repas :", m.name);
            if(!name) return;
            const ing = prompt("Ingrédients (séparés par une virgule) :", m.ing);
            const cat = prompt("Catégorie (Petit-déjeuner, Déjeuner ou Dîner) :", m.cat);
            const mid = id || db.ref('meals').push().key;
            db.ref('meals/'+mid).set({ name, ing: ing||'', cat: cat||'Dîner' });
        }

        function editBaby(moment) {
            const val = prompt(`${moment} :`, state.baby[state.currentBaby]?.[moment] || "");
            if(val !== null) db.ref(`baby/${state.currentBaby}/${moment}`).set(val);
        }

        function toggleItem(name) { db.ref('checked/'+name).set(!state.checked[name]); }
    </script>
</body>
</html>
